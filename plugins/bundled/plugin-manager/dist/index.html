<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>插件中心</title>
    <style>
      :root {
        --bg: #ffffff; --bg-muted: #f1f5f9; --fg: #0f172a; --fg-muted: #64748b;
        --border: #e2e8f0; --accent: #4f46e5; --accent-fg: #ffffff;
        --success: #16a34a; --warning: #d97706; --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0f172a; --bg-muted: #1e293b; --fg: #f8fafc; --fg-muted: #94a3b8; --border: #334155; --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.4); color-scheme: dark; }
      }
      :root.theme-light { --bg: #ffffff; --bg-muted: #f1f5f9; --fg: #0f172a; --fg-muted: #64748b; --border: #e2e8f0; }
      :root.theme-dark { --bg: #0f172a; --bg-muted: #1e293b; --fg: #f8fafc; --fg-muted: #94a3b8; --border: #334155; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--fg); line-height: 1.6; }
      .page { max-width: 44rem; margin: 0 auto; padding: 2rem 1.5rem; }
      .header { margin-bottom: 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
      .header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; }
      .header p { margin: 0.25rem 0 0; color: var(--fg-muted); font-size: 0.875rem; }
      .btn { border: 0; border-radius: 0.5rem; cursor: pointer; font: inherit; font-size: 0.8125rem; font-weight: 500; padding: 0.45rem 1rem; }
      .btn-primary { background: var(--accent); color: var(--accent-fg); }
      .btn-secondary { background: var(--bg-muted); color: var(--fg); }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .grid { display: grid; gap: 1rem; }
      .card { border-radius: 0.875rem; background: var(--bg-muted); padding: 1rem 1.125rem; box-shadow: var(--shadow); }
      .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
      .card-title-row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; }
      .card-title { font-size: 1rem; font-weight: 600; margin: 0; }
      .card-id { margin: 0; font-size: 0.75rem; color: var(--fg-muted); }
      .card-desc { margin: 0.5rem 0 0; font-size: 0.8125rem; color: var(--fg-muted); }
      .card-author { margin: 0.5rem 0 0; font-size: 0.75rem; color: var(--fg-muted); }
      .card-section { margin-top: 1rem; }
      .card-section-title { margin: 0 0 0.5rem; font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg-muted); }
      .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 0.15rem 0.55rem; font-size: 0.6875rem; font-weight: 500; line-height: 1.4; }
      .badge-neutral { background: var(--bg); color: var(--fg-muted); }
      .badge-success { background: color-mix(in srgb, var(--success) 10%, transparent); color: var(--success); }
      .badge-warning { background: color-mix(in srgb, var(--warning) 10%, transparent); color: var(--warning); }
      .badge-muted { background: var(--bg); color: var(--fg-muted); opacity: 0.7; }
      .cmd-row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; border-radius: 0.5rem; background: var(--bg); padding: 0.5rem 0.75rem; margin-bottom: 0.375rem; }
      .cmd-title { font-size: 0.8125rem; font-weight: 500; }
      .cmd-subtitle { font-size: 0.75rem; color: var(--fg-muted); margin-top: 0.125rem; }
      .perm-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.25rem; }
      .path-text { font-size: 0.75rem; color: var(--fg-muted); word-break: break-all; margin-top: 0.125rem; }
      .loading { display: flex; align-items: center; justify-content: center; padding: 4rem 0; color: var(--fg-muted); }
      .error { border-radius: 0.75rem; background: var(--bg-muted); padding: 1.5rem; text-align: center; color: #dc2626; }
      .empty { border-radius: 0.75rem; background: var(--bg-muted); padding: 2rem; text-align: center; color: var(--fg-muted); font-size: 0.875rem; }
      .empty p { margin: 0.25rem 0 0; font-size: 0.8125rem; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <div>
          <h1>插件中心</h1>
          <p>管理插件生命周期、配置和扩展能力。</p>
        </div>
        <div class="actions">
          <button class="btn btn-secondary" disabled>插件市场即将支持</button>
          <button class="btn btn-secondary" disabled>本地安装即将支持</button>
          <button class="btn btn-primary" id="btn-refresh">刷新</button>
        </div>
      </div>
      <div id="content">
        <div class="loading">正在加载插件列表...</div>
      </div>
    </div>

    <script>
      var contentEl = document.getElementById('content');
      var btnRefresh = document.getElementById('btn-refresh');

      function escapeHtml(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function sourceLabel(s) { return s === 'bundled' ? '内置' : '用户安装'; }
      function sourceTone(s) { return s === 'bundled' ? 'success' : 'neutral'; }
      function cmdModeLabel(m) { return m === 'instant' ? '即时命令' : m === 'view' ? '视图' : m === 'searchProvider' ? '搜索源' : m; }

      function render(plugins) {
        if (!plugins.length) {
          contentEl.innerHTML = '<div class="empty"><strong>暂无可管理的插件</strong><p>用户插件仍可放入应用数据目录的 plugins 文件夹后重启发现。</p></div>';
          return;
        }

        var h = '<div class="grid">';
        plugins.forEach(function(p) {
          var permList = (p.permissions || []).join('、') || '未声明权限';
          var cmdHtml = (p.commands || []).map(function(c) {
            return '<div class="cmd-row"><div><span class="cmd-title">' + escapeHtml(c.title) + '</span>' +
              (c.subtitle ? '<div class="cmd-subtitle">' + escapeHtml(c.subtitle) + '</div>' : '') +
              '<div class="cmd-subtitle">' + escapeHtml(c.id) + '</div></div>' +
              '<span class="badge badge-neutral">' + cmdModeLabel(c.mode) + '</span></div>';
          }).join('') || '<div class="perm-tags">未声明命令</div>';

          h += '<div class="card">';
          h += '<div class="card-header"><div class="min-w-0">';
          h += '<div class="card-title-row">';
          h += '<h2 class="card-title">' + escapeHtml(p.name) + '</h2>';
          h += '<span class="badge badge-neutral">v' + escapeHtml(p.version) + '</span>';
          h += '<span class="badge badge-' + sourceTone(p.source) + '">' + sourceLabel(p.source) + '</span>';
          h += '<span class="badge badge-' + (p.enabled ? 'success' : 'muted') + '">' + (p.enabled ? '已启用' : '已停用') + '</span>';
          h += '<span class="badge badge-' + (p.trusted ? 'success' : 'warning') + '">' + (p.source === 'bundled' && p.trusted ? '内置信任' : p.trusted ? '已信任' : '未信任') + '</span>';
          h += '</div>';
          h += '<p class="card-id">' + escapeHtml(p.id) + '</p>';
          if (p.description) h += '<p class="card-desc">' + escapeHtml(p.description) + '</p>';
          if (p.author) h += '<p class="card-author">作者：' + escapeHtml(p.author) + '</p>';
          h += '</div></div>';

          h += '<div class="card-section"><h3 class="card-section-title">命令</h3>' + cmdHtml + '</div>';
          h += '<div class="card-section"><h3 class="card-section-title">权限</h3><div class="perm-tags">' + escapeHtml(permList) + '</div></div>';
          h += '<div class="card-section"><h3 class="card-section-title">来源路径</h3><div class="path-text">' + escapeHtml(p.path) + '</div></div>';
          h += '</div>';
        });
        h += '</div>';
        contentEl.innerHTML = h;
      }

      async function load() {
        contentEl.innerHTML = '<div class="loading">正在加载插件列表...</div>';
        btnRefresh.disabled = true;
        btnRefresh.textContent = '正在刷新...';
        try {
          var plugins = await window.litools.plugins.list();
          render(plugins);
        } catch (err) {
          contentEl.innerHTML = '<div class="error">插件列表加载失败：' + escapeHtml(String(err)) + '</div>';
        } finally {
          btnRefresh.disabled = false;
          btnRefresh.textContent = '刷新';
        }
      }

      btnRefresh.addEventListener('click', function() { load(); });

      async function waitForLitools() {
        if (window.litools && window.litools.runtime) return;
        return new Promise(function(resolve) { setTimeout(function() { waitForLitools().then(resolve); }, 100); });
      }

      window.addEventListener('DOMContentLoaded', function() {
        waitForLitools().then(function() {
          window.litools.runtime.ready().then(function() { load(); }).catch(function() { load(); });
        });
      });
    </script>
  </body>
</html>

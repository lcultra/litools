<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>诊断</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-muted: #f1f5f9;
        --fg: #0f172a;
        --fg-muted: #64748b;
        --border: #e2e8f0;
        --accent: #4f46e5;
        --accent-fg: #ffffff;
        --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0f172a; --bg-muted: #1e293b; --fg: #f8fafc; --fg-muted: #94a3b8; --border: #334155; --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.4); color-scheme: dark; }
      }
      :root.theme-light { --bg: #ffffff; --bg-muted: #f1f5f9; --fg: #0f172a; --fg-muted: #64748b; --border: #e2e8f0; --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); color-scheme: light; }
      :root.theme-dark { --bg: #0f172a; --bg-muted: #1e293b; --fg: #f8fafc; --fg-muted: #94a3b8; --border: #334155; --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.4); color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--fg); }
      .page { max-width: 40rem; margin: 0 auto; padding: 2rem 1.5rem; }
      .header { margin-bottom: 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
      .header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; }
      .header p { margin: 0.25rem 0 0; color: var(--fg-muted); font-size: 0.875rem; }
      .btn { border: 0; border-radius: 0.5rem; cursor: pointer; font: inherit; font-size: 0.875rem; font-weight: 500; padding: 0.5rem 1.25rem; background: var(--accent); color: var(--accent-fg); }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .grid { display: grid; gap: 0.5rem; font-size: 0.8125rem; }
      .info-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; border-radius: 0.75rem; background: var(--bg-muted); padding: 0.625rem 1rem; }
      .info-label { color: var(--fg-muted); flex-shrink: 0; }
      .info-value { font-weight: 500; text-align: right; word-break: break-all; }
      .section-title { margin: 2rem 0 0.75rem; font-size: 1.125rem; font-weight: 600; }
      .usage-card { display: grid; gap: 0.25rem; border-radius: 0.75rem; background: var(--bg-muted); padding: 0.625rem 1rem; }
      .usage-title { font-weight: 500; display: flex; justify-content: space-between; gap: 1rem; }
      .usage-time { color: var(--fg-muted); font-size: 0.75rem; }
      .empty-state { border-radius: 0.75rem; background: var(--bg-muted); padding: 1.5rem; text-align: center; color: var(--fg-muted); }
      .loading { display: flex; align-items: center; justify-content: center; padding: 4rem 0; color: var(--fg-muted); font-size: 0.875rem; }
      .error { border-radius: 0.75rem; background: var(--bg-muted); padding: 1.5rem; text-align: center; color: #dc2626; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <div>
          <h1>诊断</h1>
          <p>查看 litools 的运行状态和本地数据。</p>
        </div>
        <button class="btn" id="btn-refresh">刷新</button>
      </div>
      <div id="content">
        <div class="loading">正在加载诊断信息...</div>
      </div>
    </div>

    <script>
      var contentEl = document.getElementById('content');
      var btnRefresh = document.getElementById('btn-refresh');

      function loader(text) {
        return '<div class="loading">' + escapeHtml(text) + '</div>';
      }

      function errorBox(text) {
        return '<div class="error">' + escapeHtml(text) + '</div>';
      }

      function infoRow(label, value) {
        return '<div class="info-row"><span class="info-label">' + label + '</span><span class="info-value">' + escapeHtml(String(value)) + '</span></div>';
      }

      function render(d) {
        var h = '';
        h += '<div class="grid">';
        h += infoRow('应用版本', d.app_version);
        h += infoRow('平台', d.platform);
        h += infoRow('应用数据目录', d.app_data_dir);
        h += infoRow('已安装插件', d.plugin_count);
        h += infoRow('已索引命令', d.command_count);
        h += infoRow('已索引应用', d.app_count);
        h += infoRow('应用索引状态', indexStatus(d.index_status));
        h += infoRow('最近索引刷新', reloadSummary(d.last_persisted_index_status || d.index_status.lastSummary));
        h += infoRow('应用监听', watcherSummary(d.app_watcher));
        h += infoRow('监听目录', (d.app_watcher.watchedPaths || []).join('，') || '无');
        h += infoRow('图标缓存', iconCache(d.icon_cache));
        h += infoRow('最近使用次数', d.recent_usage_count);
        h += infoRow('主题', themeLabel(d.settings.theme));
        h += infoRow('已启用的数据源', providerList(d.settings.search.enabled_providers));
        h += infoRow('窗口行为', windowBehavior(d.settings));
        h += infoRow('全局快捷键', d.shortcut.accelerator);
        h += infoRow('快捷键状态', d.shortcut.registered ? '已注册' : (d.shortcut.error || '未注册'));
        h += '</div>';

        h += '<h2 class="section-title">最近使用</h2>';
        var usage = d.recent_usage || [];
        if (usage.length > 0) {
          h += '<div class="grid">';
          usage.forEach(function(e) {
            h += '<div class="usage-card"><div class="usage-title"><span>' + escapeHtml(e.target_id) + '</span><span class="usage-time">' + targetType(e.target_type) + '</span></div>';
            h += '<span class="usage-time">' + escapeHtml(e.selected_at) + '</span></div>';
          });
          h += '</div>';
        } else {
          h += '<div class="empty-state">暂无使用记录</div>';
        }

        contentEl.innerHTML = h;
      }

      function indexStatus(s) {
        if (s.running) return s.pending ? '刷新中，已有待处理刷新' : '刷新中';
        if (s.lastError) return '失败：' + s.lastError;
        if (s.lastSummary && s.lastSummary.success) return '最近刷新成功';
        return '空闲';
      }

      function reloadSummary(s) {
        if (!s) return '暂无刷新记录';
        return [s.success ? '成功' : '失败', '触发：' + s.trigger, '应用：' + s.appsDiscovered, '移除：' + s.appsRemoved, '耗时：' + s.durationMs + 'ms', s.finishedAt].join('，');
      }

      function watcherSummary(w) {
        if (w.enabled) return '已启用（' + w.status + '）';
        return w.error ? w.status + '：' + w.error : w.status;
      }

      function iconCache(c) {
        var mb = (c.totalBytes / 1048576).toFixed(1);
        var parts = [c.fileCount + '/' + c.maxFiles + ' 个文件', mb + 'MB'];
        if (c.lastPrunedAt) parts.push('最近清理 ' + c.lastPrunedFiles + ' 个');
        if (c.error) parts.push('错误：' + c.error);
        return parts.join('，');
      }

      function themeLabel(t) { return t === 'dark' ? '深色' : t === 'light' ? '浅色' : '跟随系统'; }

      function providerLabel(p) { return p === 'apps' ? '应用' : p === 'commands' ? '命令' : p === 'plugins' ? '插件' : p; }

      function providerList(ps) { return (ps || []).map(providerLabel).join('、') || '无'; }

      function windowBehavior(s) {
        return [s.window.hide_on_blur ? '失焦时隐藏' : '失焦时保持显示', s.window.close_to_tray ? '关闭到托盘' : '关闭即退出', s.window.center_on_show ? '显示时居中' : '保持窗口位置'].join('，');
      }

      function targetType(t) { return t === 'command' ? '命令' : t === 'app' ? '应用' : t; }

      function escapeHtml(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      async function load() {
        contentEl.innerHTML = loader('正在加载诊断信息...');
        btnRefresh.disabled = true;
        btnRefresh.textContent = '正在刷新...';
        try {
          var d = await window.litools.diagnostics.get();
          render(d);
        } catch (err) {
          contentEl.innerHTML = errorBox('诊断信息加载失败：' + String(err));
        } finally {
          btnRefresh.disabled = false;
          btnRefresh.textContent = '刷新';
        }
      }

      btnRefresh.addEventListener('click', function() { load(); });

      async function waitForLitools() {
        if (window.litools && window.litools.runtime) return;
        return new Promise(function(resolve) { setTimeout(function() { waitForLitools().then(resolve); }, 100); });
      }

      window.addEventListener('DOMContentLoaded', function() {
        waitForLitools().then(function() {
          window.litools.runtime.ready().then(function() { load(); }).catch(function() { load(); });
        });
      });
    </script>
  </body>
</html>

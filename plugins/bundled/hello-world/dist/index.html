<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        color: #111827;
      }

      main {
        max-width: 32rem;
        border-radius: 1.25rem;
        background: rgb(255 255 255 / 0.86);
        box-shadow: 0 24px 80px rgb(15 23 42 / 0.16);
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 1.75rem;
      }

      p {
        margin: 1rem 0 0;
        color: #475569;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello from a bundled litools plugin</h1>
      <p>This page is loaded through the plugin runtime and served by the litools-plugin protocol.</p>
    </main>
  </body>
</html>
